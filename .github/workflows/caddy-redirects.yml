name: Caddy redirects (manual)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "recon = read Caddyfile only; apply = add redirects + reload"
        default: recon
        required: true

jobs:
  caddy:
    runs-on: ubuntu-latest
    steps:
      - name: Run on Andromeda
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "whoami: $(whoami)"
            sudo -n true 2>/dev/null && echo "passwordless-sudo: yes" || echo "passwordless-sudo: no"
            F=$(systemctl cat caddy 2>/dev/null | grep -oE '/[^ ]+Caddyfile' | head -1)
            F=${F:-/etc/caddy/Caddyfile}
            echo "CADDYFILE_PATH: $F"
            echo "=====BEGIN CADDYFILE====="
            cat "$F" 2>/dev/null || sudo cat "$F" 2>/dev/null || echo "(could not read $F)"
            echo "=====END CADDYFILE====="
